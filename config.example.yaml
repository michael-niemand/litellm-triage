model_list:
  # "Cloud" model — used for non-sensitive queries
  - model_name: cloud-model
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  # "Local" model — used for sensitive queries (Ollama, self-hosted)
  - model_name: local-model
    litellm_params:
      model: ollama/llama3
      api_base: http://ollama:11434

guardrails:
  - guardrail_name: "triage"
    litellm_params:
      guardrail: litellm_triage.guardrail.TriageGuardrail
      mode: "pre_call"
      default_on: true

      # IMPORTANT: use provider model strings here, NOT LiteLLM group names.
      # The hook fires inside litellm.acompletion() after group names are resolved.
      # Examples: "ollama/llama3", "anthropic/claude-haiku-4-5-20251001"
      sensitive_model: "ollama/llama3"
      public_model: "openai/gpt-4o"

      # Classifier strategy: "presidio" | "local_llm" | "hybrid" (recommended)
      # - presidio:  fast (~50ms), catches named PII (names, SSNs, emails, etc.)
      # - local_llm: slower (~200-400ms), catches implicit sensitivity
      # - hybrid:    presidio first, local LLM fallback for ambiguous cases
      classifier: "hybrid"

      # Score threshold for sensitivity (0.0–1.0)
      # 0.85 recommended for presidio-only; lower values increase false positives
      # (Presidio flags place names like "France" as LOCATION at 0.85)
      threshold: 0.85

      # Presidio Analyzer endpoint
      presidio_url: "http://presidio-analyzer:3000"

      # Ollama endpoint + model used for the LLM classifier stage (hybrid/local_llm)
      ollama_url: "http://ollama:11434"
      ollama_classifier_model: "llama3.2:1b"

litellm_settings:
  # Optional: plug in your observability backend
  # Triage metadata is injected into every request under metadata.triage
  # success_callback: ["langfuse"]

general_settings:
  guardrails_on_all_requests: true
