apiVersion: v1
kind: Service
metadata:
  name: {{ include "litellm-triage.fullname" . }}-litellm
  labels:
    {{- include "litellm-triage.litellm.labels" . | nindent 4 }}
spec:
  type: {{ .Values.litellm.service.type }}
  ports:
    - port: {{ .Values.litellm.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "litellm-triage.litellm.selectorLabels" . | nindent 4 }}
