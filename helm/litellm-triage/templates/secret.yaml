{{- if or .Values.apiKeys.openai .Values.apiKeys.anthropic }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "litellm-triage.fullname" . }}-api-keys
  labels:
    {{- include "litellm-triage.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.apiKeys.openai }}
  openai-api-key: {{ .Values.apiKeys.openai | b64enc | quote }}
  {{- end }}
  {{- if .Values.apiKeys.anthropic }}
  anthropic-api-key: {{ .Values.apiKeys.anthropic | b64enc | quote }}
  {{- end }}
{{- end }}
