apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "litellm-triage.fullname" . }}-presidio-anonymizer
  labels:
    {{- include "litellm-triage.presidio-anonymizer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.presidioAnonymizer.replicaCount }}
  selector:
    matchLabels:
      {{- include "litellm-triage.presidio-anonymizer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "litellm-triage.presidio-anonymizer.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: presidio-anonymizer
          image: "{{ .Values.presidioAnonymizer.image.repository }}:{{ .Values.presidioAnonymizer.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.presidioAnonymizer.resources | nindent 12 }}
