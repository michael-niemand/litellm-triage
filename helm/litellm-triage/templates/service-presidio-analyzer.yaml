apiVersion: v1
kind: Service
metadata:
  name: {{ include "litellm-triage.fullname" . }}-presidio-analyzer
  labels:
    {{- include "litellm-triage.presidio-analyzer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.presidioAnalyzer.service.type }}
  ports:
    - port: {{ .Values.presidioAnalyzer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "litellm-triage.presidio-analyzer.selectorLabels" . | nindent 4 }}
