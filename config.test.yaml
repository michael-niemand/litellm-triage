# Test config — uses Anthropic API for both model slots (no Ollama required).
# Sensitive queries route to Haiku (cheap/fast), clean queries to Sonnet.
# Replace with your preferred models and set ANTHROPIC_API_KEY in your env.

model_list:
  - model_name: cloud-model
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250929
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: local-model
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

guardrails:
  - guardrail_name: "triage"
    litellm_params:
      guardrail: litellm_triage.guardrail.TriageGuardrail
      mode: "pre_call"
      default_on: true
      sensitive_model: "anthropic/claude-haiku-4-5-20251001"
      public_model: "anthropic/claude-sonnet-4-5-20250929"
      classifier: "presidio"
      threshold: 0.85
      presidio_url: "http://presidio-analyzer:3000"

general_settings:
  guardrails_on_all_requests: true
